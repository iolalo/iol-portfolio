name: Trade Bot

on:
  schedule:
    # 11:00 ART = 14:00 UTC — arranca al inicio de BYMA, el loop interno corre hasta las 17:00
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular sin ejecutar órdenes reales"
        required: false
        default: "true"
        type: boolean

concurrency:
  group: trade-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run trade bot
        timeout-minutes: 370
        env:
          IOL_USERNAME: ${{ secrets.IOL_USERNAME }}
          IOL_PASSWORD: ${{ secrets.IOL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          LOOP_MINUTES: "5"
          SCAN_BUDGET_PCT: "30"
          SCAN_ASSET_TYPES: "ACCION,CEDEAR"
        run: python scripts/trade_executor.py

      - name: Commit trade log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trades_log.json
          git diff --cached --quiet || git commit -m "chore: trade log $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
