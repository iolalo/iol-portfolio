name: Trade Bot

on:
  schedule:
    # 17:35 ART = 20:35 UTC (35 min después del cierre BYMA 17:00), L-V
    # IMPORTANTE: cambiar DRY_RUN a 'false' cuando estés listo para operar en real
    - cron: "35 20 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular sin ejecutar órdenes reales"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run trade bot
        env:
          IOL_USERNAME: ${{ secrets.IOL_USERNAME }}
          IOL_PASSWORD: ${{ secrets.IOL_PASSWORD }}
          # Cambiar 'true' → 'false' para activar trading real en el cron
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: python scripts/trade_bot.py

      - name: Commit trade log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trades_log.json
          git diff --cached --quiet || git commit -m "chore: trade log $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
