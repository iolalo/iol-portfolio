name: Update Portfolio

on:
  schedule:
    # Resumen diario 18:15 ART = 21:15 UTC (lunes a viernes)
    - cron: "15 21 * * 1-5"
    # Actualización cada 10 min durante horario BYMA (11-17h ART = 14-20h UTC)
    - cron: "*/10 14-20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch portfolio & send alerts
        env:
          IOL_USERNAME:   ${{ secrets.IOL_USERNAME }}
          IOL_PASSWORD:   ${{ secrets.IOL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/fetch_portfolio.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json
          git diff --cached --quiet || git commit -m "chore: update portfolio $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
